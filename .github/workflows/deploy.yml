name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - deploy/**
      - .github/workflows/deploy.yml

permissions:
  contents: read
  packages: write

jobs:
  # Builds the image on PRs that touch the deploy surface (verification)
  # and on every push to main (pushed to GHCR, tagged latest + sha).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/shelfready/shelfready:latest
            ghcr.io/shelfready/shelfready:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Migrations + deploy activate once the staging secrets exist; until
  # then they no-op cleanly so main stays green pre-VPS (issue #7).
  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check staging secrets
        id: gate
        env:
          HAS: ${{ secrets.VPS_SSH_KEY != '' && secrets.DATABASE_URL != '' }}
        run: echo "ready=$HAS" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm
      - name: Run migrations against Neon
        if: steps.gate.outputs.ready == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm ci && npm run db:migrate
      - name: Deploy over SSH
        if: steps.gate.outputs.ready == 'true'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "cd ~/shelfready && docker compose pull && docker compose up -d"
      - name: Skipped (no staging secrets yet)
        if: steps.gate.outputs.ready != 'true'
        run: echo "Staging secrets not configured — build-only run (issue #7 part 2)."
