# Staging stack on the VPS (ADR-0005, ADR-0008). Copy this directory to
# the box, put real values in an untracked .env next to it (at minimum
# POSTGRES_PASSWORD + the app secrets), then:
#   docker compose up -d
# Migrations:  docker compose --profile ops run --rm migrate
# Rollback:    IMAGE_TAG=<previous sha> docker compose up -d app
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shelfready
      POSTGRES_USER: shelfready
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deploy/.env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelfready -d shelfready"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/shelfready/shelfready:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://shelfready:${POSTGRES_PASSWORD}@postgres:5432/shelfready
      INNGEST_BASE_URL: http://inngest:8288
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    # Feed artifacts survive restarts (FsStore until R2 lands, issue #16).
    volumes:
      - artifacts_staging:/app/.artifacts

  # Self-hosted Inngest server (issue #129): runs every cron — heartbeats,
  # scheduled syncs, drift checks, webhook retries, usage pruning — for
  # both the staging and prod apps. Keys are generated into .env by
  # prod-bootstrap.sh.
  inngest:
    image: inngest/inngest:latest
    restart: unless-stopped
    command:
      - inngest
      - start
      - --event-key
      - ${INNGEST_EVENT_KEY}
      - --signing-key
      - ${INNGEST_SIGNING_KEY}
      - --sdk-url
      - http://app:3000/api/inngest
      - --sdk-url
      - http://app-prod:3000/api/inngest
    volumes:
      - inngest_data:/root/.inngest
    expose:
      - "8288"

  migrate:
    image: ghcr.io/shelfready/shelfready-migrate:${IMAGE_TAG:-latest}
    profiles: ["ops"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://shelfready:${POSTGRES_PASSWORD}@postgres:5432/shelfready
    depends_on:
      postgres:
        condition: service_healthy

  # Production app: tag-pinned image, own database, own env (issue #76).
  app-prod:
    image: ghcr.io/shelfready/shelfready:${PROD_IMAGE_TAG:-latest}
    profiles: ["prod"]
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: postgres://shelfready:${POSTGRES_PASSWORD}@postgres:5432/shelfready_prod
      INNGEST_BASE_URL: http://inngest:8288
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - artifacts_prod:/app/.artifacts

  migrate-prod:
    image: ghcr.io/shelfready/shelfready-migrate:${PROD_IMAGE_TAG:-latest}
    profiles: ["ops"]
    env_file: .env.prod
    environment:
      DATABASE_URL: postgres://shelfready:${POSTGRES_PASSWORD}@postgres:5432/shelfready_prod
    depends_on:
      postgres:
        condition: service_healthy

  # Privacy-friendly analytics (postgres-only; ClickHouse-based options
  # don't fit the box).
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    profiles: ["prod"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://shelfready:${POSTGRES_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-set-me}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  # Daily pg_dump with 14-day local retention (ADR-0008). Offsite copies
  # to R2 + restore drill are a pre-launch requirement: issue #37.
  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          pg_dump -h postgres -U shelfready -Fc shelfready \
            > "/backups/shelfready-$$(date +%F).dump" \
            && echo "backup ok $$(date +%F)"
          find /backups -name '*.dump' -mtime +14 -delete
          sleep 86400
        done
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  inngest_data:
  caddy_data:
  caddy_config:
  artifacts_staging:
  artifacts_prod:
